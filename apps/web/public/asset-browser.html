<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Browser — Paper Plane Exploration</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 380px; min-width: 300px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
#search { padding: 10px; }
#search input { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #0f3460; background: #0a1628; color: #eee; font-size: 14px; }
#filters { padding: 0 10px 8px; display: flex; flex-wrap: wrap; gap: 4px; }
#filters button { padding: 3px 10px; border-radius: 12px; border: 1px solid #0f3460; background: #0a1628; color: #aaa; cursor: pointer; font-size: 11px; }
#filters button.active { background: #0f3460; color: #fff; border-color: #1a5276; }
#stats { padding: 0 10px 6px; font-size: 11px; color: #666; }
#list { flex: 1; overflow-y: auto; padding: 0 8px; }
.item { padding: 6px 8px; margin: 2px 0; border-radius: 4px; cursor: pointer; font-size: 12px; border: 1px solid transparent; }
.item:hover { background: #1a2744; }
.item.selected { background: #0f3460; border-color: #1a5276; }
.item.picked { background: #1a2a1a; }
.item .name { font-weight: 600; color: #ccc; flex:1 }
.item .star { cursor: pointer; font-size: 14px; padding: 0 2px; user-select: none; }
.item .star:hover { transform: scale(1.2); }
.item .meta { font-size: 10px; color: #777; margin-top: 1px; }
.item .dim { color: #5a8; }
#viewer { flex: 1; position: relative; }
#info { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none; }
#info .label { color: #888; }
#info .val { color: #fff; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #888; font-size: 14px; display: none; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="search"><input type="text" placeholder="Search assets..." id="searchInput"></div>
  <div id="filters">
    <button data-cat="all" class="active">All</button>
    <button data-cat="tree">Trees</button>
    <button data-cat="bush">Bushes</button>
    <button data-cat="rock">Rocks</button>
    <button data-cat="structure">Structures</button>
    <button data-cat="landmark">Landmarks</button>
    <button data-cat="prop">Props</button>
    <button data-cat="vehicle">Vehicles</button>
    <button data-cat="scene">Scenes</button>
    <button data-cat="unknown">Other</button>
    <button data-cat="selected" style="background:#1a3a1a;border-color:#2a5a2a">⭐ Selected</button>
  </div>
  <div id="stats"></div>
  <div style="padding:4px 10px;display:flex;gap:4px">
    <button id="exportBtn" style="padding:4px 10px;border-radius:4px;background:#1a3a1a;color:#8c8;border:1px solid #2a5a2a;cursor:pointer;font-size:11px">📋 Export Selected</button>
    <button id="clearBtn" style="padding:4px 10px;border-radius:4px;background:#3a1a1a;color:#c88;border:1px solid #5a2a2a;cursor:pointer;font-size:11px">✕ Clear All</button>
  </div>
  <div id="list"></div>
</div>
<div id="viewer">
  <div id="loading">Loading model...</div>
  <div id="info">
    <div><span class="label">Name: </span><span class="val" id="infoName">—</span></div>
    <div><span class="label">Size: </span><span class="val" id="infoSize">—</span></div>
    <div><span class="label">Scale: </span><span class="val" id="infoScale">—</span></div>
    <div><span class="label">Verts: </span><span class="val" id="infoVerts">—</span></div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// Load database
const resp = await fetch('/glb-database.json');
const db = await resp.json();

// State
let selectedCategory = 'all';
let searchQuery = '';
let currentModel = null;

// Selection state (persisted in localStorage)
let selectedIds = new Set(JSON.parse(localStorage.getItem('assetBrowser_selected') || '[]'));

function saveSelections() {
  localStorage.setItem('assetBrowser_selected', JSON.stringify([...selectedIds]));
}
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  saveSelections();
  renderList();
}

// Three.js setup
const viewer = document.getElementById('viewer');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');
scene.fog = new THREE.Fog('#1a1a2e', 5, 30);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camera.position.set(3, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
viewer.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;
controls.target.set(0, 0, 0);

// Lights
scene.add(new THREE.AmbientLight('#ffffff', 1.5));
const key = new THREE.DirectionalLight('#ffffff', 3);
key.position.set(5, 8, 5);
scene.add(key);
const fill = new THREE.DirectionalLight('#8899cc', 1);
fill.position.set(-3, 2, -2);
scene.add(fill);

// Base platform
const platformGeo = new THREE.CircleGeometry(4, 32);
const platformMat = new THREE.MeshStandardMaterial({ color: '#2a2a3e', roughness: 0.4, metalness: 0.1 });
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.rotation.x = -Math.PI / 2;
platform.position.y = -0.01;
platform.receiveShadow = true;
scene.add(platform);

// Subtle ring
const ringGeo = new THREE.TorusGeometry(4, 0.03, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: '#3a3a5e', roughness: 0.3, metalness: 0.3 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.001;
scene.add(ring);

// Group for loaded model
const modelGroup = new THREE.Group();
scene.add(modelGroup);

const loader = new GLTFLoader();

// Draco decoder for compressed meshes
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('/draco/');
loader.setDRACOLoader(dracoLoader);

function loadModel(entry) {
  document.getElementById('loading').style.display = 'block';
  // Clear previous
  while(modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
  
  const path = entry.path;
  // Path relative to project root: "assets/polypizza/nature/Tree.glb" or "apps/web/public/..."
  // assets-proxy symlink: public/assets-proxy -> ../assets
  // So "assets/foo/bar.glb" becomes "/assets-proxy/foo/bar.glb"
  let url;
  if (path.startsWith('assets/')) {
    url = '/assets-proxy/' + path.substring(7);
  } else if (path.startsWith('apps/web/public/')) {
    url = '/' + path.substring('apps/web/public/'.length);
  } else {
    url = '/assets-proxy/' + path;
  }
  
  loader.load(url, (gltf) => {
    const model = gltf.scene;
    // Center model and place on ground
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 3 / (maxDim || 1);
    
    // Place model so bottom sits on the ground plane
    model.position.set(
      -center.x * scale,
      -box.min.y * scale,  // lift so bottom touches y=0
      -center.z * scale
    );
    model.scale.setScalar(scale);
    modelGroup.add(model);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('infoName').textContent = entry.filename;
    document.getElementById('infoSize').textContent = `${entry.width}m × ${entry.height}m × ${entry.depth}m`;
    document.getElementById('infoScale').textContent = `${entry.suggestedScale}x (to 3m)`;
    document.getElementById('infoVerts').textContent = entry.vertexCount.toLocaleString();
    currentModel = entry;
  }, undefined, () => {
    document.getElementById('loading').textContent = 'Failed to load model';
  });
}

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / Math.max(h, 1);
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {});

// Filtering
function filterAssets() {
  let filtered = db;
  if (selectedCategory === 'selected') {
    filtered = filtered.filter(e => selectedIds.has(e.id));
  } else if (selectedCategory !== 'all') {
    filtered = filtered.filter(e => e.category === selectedCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(e => 
      e.filename.toLowerCase().includes(q) || 
      e.tags.some(t => t.includes(q)) ||
      e.source.includes(q)
    );
  }
  return filtered;
}

function renderList() {
  const filtered = filterAssets();
  document.getElementById('stats').textContent = `${filtered.length} of ${db.length} assets · ⭐ ${selectedIds.size} selected`;
  const list = document.getElementById('list');
  list.innerHTML = '';
  for (const e of filtered.slice(0, 500)) {
    const div = document.createElement('div');
    const sel = selectedIds.has(e.id);
    div.className = 'item' + (currentModel === e ? ' selected' : '') + (sel ? ' picked' : '');
    div.style.borderLeft = sel ? '3px solid #4a4' : '3px solid transparent';
    div.style.display = 'flex';
    div.style.justifyContent = 'space-between';
    div.style.alignItems = 'flex-start';
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="name">${e.filename.replace('.glb','')}</div>
        <div class="meta">
          <span class="dim">${e.width}m×${e.height}m×${e.depth}m</span> · 
          ${e.category} · ${e.fileSizeKB}KB · ${e.source}
        </div>
      </div>
      <span class="star" data-id="${e.id}" title="Toggle selection">${sel ? '⭐' : '☆'}</span>
    `;
    div.onclick = (ev) => {
      // Ignore clicks on the star
      if (ev.target.classList.contains('star')) return;
      document.querySelectorAll('.item.selected').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      loadModel(e);
    };
    div.querySelector('.star').onclick = (ev) => {
      ev.stopPropagation();
      toggleSelect(e.id);
    };
    list.appendChild(div);
  }
}

// Events
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderList();
});

document.querySelectorAll('#filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.dataset.cat;
    renderList();
  });
});

// Initial render
renderList();

// Export / Clear buttons
document.getElementById('exportBtn').addEventListener('click', () => {
  const selected = db.filter(e => selectedIds.has(e.id));
  const data = selected.map(e => ({
    filename: e.filename,
    source: e.source,
    path: e.path,
    width: e.width,
    height: e.height,
    depth: e.depth,
    category: e.category,
    tags: e.tags,
    suggestedScale: e.suggestedScale,
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'selected-assets.json';
  a.click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm(`Clear all ${selectedIds.size} selections?`)) {
    selectedIds.clear();
    saveSelections();
    renderList();
  }
});

// Keyboard: space to toggle selection on current model
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && currentModel) {
    e.preventDefault();
    toggleSelect(currentModel.id);
  }
});

// Load first tree by default
const firstTree = db.find(e => e.category === 'tree' && e.height > 1 && e.height < 5);
if (firstTree) loadModel(firstTree);
</script>
</body>
</html>
